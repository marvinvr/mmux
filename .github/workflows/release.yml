name: Release

# Publishes a release and bumps the Homebrew formula whenever a version tag is
# pushed, e.g.:
#
#   git tag v0.1.1
#   git push origin v0.1.1
#
# 1. `build` compiles a release binary for each target and uploads it as an artifact.
# 2. `release` creates the GitHub Release (binaries attached), then rewrites the
#    formula in the marvinvr/homebrew-mmux tap to point at the per-platform binaries
#    (with a source-build fallback for platforms we don't ship), and commits it over
#    SSH using a deploy key (secret TAP_DEPLOY_KEY) scoped to that tap only.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release on this repo

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # don't ship a partial set of binaries if one target breaks
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest # cross-compiled on the arm runner (universal Apple toolchain)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: tar -czf "mmux-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" mmux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmux-${{ matrix.target }}
          path: mmux-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

      - name: Load tap deploy key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.TAP_DEPLOY_KEY }}

      - name: Bump Homebrew formula
        env:
          TAG: ${{ github.ref_name }}
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
        run: bash .github/scripts/bump-formula.sh
