server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text-ish assets. Images/fonts are already compact (no font binaries shipped).
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    # nginx maps .js to text/javascript, so list both to actually gzip the JS.
    gzip_types text/html text/css application/javascript text/javascript image/svg+xml;

    # Security headers. The site has NO inline scripts and NO inline styles
    # (only an inline data: favicon link), so the CSP needs no 'unsafe-inline'.
    # Zero external origins: everything is 'self' except data: images (favicon).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'none'" always;

    # SPA-ish fallback (single page; harmless for unknown paths).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must always be revalidated so deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        # add_header re-declares headers in this location, so repeat the security set.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'none'" always;
    }

    # Fingerprint-free assets — long immutable cache. CSS/JS/fonts are content the
    # browser can hold forever; bust by changing the filename if ever needed.
    location ~* \.(?:css|js|woff2?|ttf|otf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'none'" always;
    }
}
