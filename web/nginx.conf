server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # utf-8 on text responses — the plain-text banner uses box-drawing glyphs.
    charset utf-8;

    # Compress text-ish assets. Images are already compact; the one woff2 is too.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    # nginx maps .js to text/javascript, so list both to actually gzip the JS.
    # text/plain + xml cover llms.txt / robots.txt / sitemap.xml.
    gzip_types text/html text/css application/javascript text/javascript image/svg+xml text/plain application/xml;

    # Security headers. The site has NO executable inline scripts and NO inline
    # styles (only an inline data: favicon and one application/ld+json data block,
    # which CSP's script-src does not govern), so the CSP needs no 'unsafe-inline'.
    # The ONE external origin is the self-hosted umami instance: script-src loads
    # its tracker, connect-src lets the tracker post its beacon. Everything else
    # is 'self' (+ data: images for the favicon).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://stats.marvinvr.ch; connect-src 'self' https://stats.marvinvr.ch; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'none'" always;

    # Terminal people get a terminal answer: `curl mmux.org` serves the plain-text
    # banner instead of HTML (the wttr.in trick). The rewrite-inside-if is one of
    # the two sanctioned `if` forms (rewrite … last). Browsers fall through to
    # index.html via an internal redirect, which re-matches the location below so
    # the no-cache header still applies.
    location = / {
        if ($http_user_agent ~* "(curl|wget|httpie)") {
            rewrite ^ /banner.txt last;
        }
        try_files /__never__ /index.html;
    }

    # SPA-ish fallback (single page; harmless for unknown paths).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must always be revalidated so deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        # add_header re-declares headers in this location, so repeat the security set.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://stats.marvinvr.ch; connect-src 'self' https://stats.marvinvr.ch; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'none'" always;
    }

    # The install script (`curl -fsSL https://mmux.org/install.sh | sh`). Served as
    # inspectable text/plain and always revalidated, so a fix ships on the next deploy.
    location = /install.sh {
        default_type text/plain;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Fingerprinted assets — long immutable cache. The Dockerfile renames CSS/JS
    # to <name>.<contenthash>.<ext>, so a changed file gets a new URL and is
    # refetched; identical bytes keep their name and stay cached forever.
    location ~* \.(?:css|js|woff2?|ttf|otf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://stats.marvinvr.ch; connect-src 'self' https://stats.marvinvr.ch; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'none'" always;
    }
}
